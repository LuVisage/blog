<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0a0b0"/>
      <stop offset="50%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#a0a0b0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="180" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1000" cy="450" r="180" fill="rgba(255,255,255,0.02)"/>
  <circle cx="600" cy="315" r="280" fill="rgba(255,255,255,0.015)"/>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="72" font-weight="bold" fill="url(#text)">
    Baron_Zhang
  </text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="28" fill="#888">
    AI 探索者 &amp; Agent 开发者
  </text>
  <!-- Divider -->
  <line x1="450" y1="420" x2="750" y2="420" stroke="#555" stroke-width="1" opacity="0.5"/>
  <!-- Bottom text -->
  <text x="600" y="480" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="20" fill="#666">
    分享 AI Agent 开发实战经验 🤖
  </text>
</svg>
